<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音樂視覺化播放器</title>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* 畫布層 */
        #visualizer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 播放按鈕 */
        #playButton {
            position: relative;
            z-index: 10;
            width: 100px;
            height: 100px;
            background: #ffffff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #playButton:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.4);
        }

        /* 播放/暫停 圖標 */
        .icon {
            width: 0;
            height: 0;
            border-style: solid;
            transition: 0.2s;
        }

        .play {
            border-width: 15px 0 15px 25px;
            border-color: transparent transparent transparent #111;
            margin-left: 5px;
        }

        .pause {
            width: 20px;
            height: 30px;
            border-width: 0 8px 0 8px;
            border-color: #111;
            border-style: double;
        }

        /* 訊息提示 */
        #status {
            position: absolute;
            bottom: 30px;
            z-index: 10;
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>

    <canvas id="visualizer"></canvas>
